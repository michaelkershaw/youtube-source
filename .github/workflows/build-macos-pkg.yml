name: Build macOS Plugin

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Build plugin bundle
        working-directory: mac
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -S .
          cmake --build build --config Release

      - name: Stage files
        working-directory: mac
        run: |
          STAGING="staging/youtube-source-mac"
          mkdir -p "$STAGING"
          
          # Copy plugin bundle
          cp -R build/YouTubeSource.bundle "$STAGING/"
          
          # Copy UI files
          mkdir -p "$STAGING/youtube-source/ui"
          cp -R ../ui/* "$STAGING/youtube-source/ui/"
          
          # Download yt-dlp
          curl -sL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos" \
            -o "$STAGING/youtube-source/yt-dlp"
          chmod +x "$STAGING/youtube-source/yt-dlp"
          
          # Copy ffmpeg
          cp "$(which ffmpeg)" "$STAGING/youtube-source/ffmpeg"
          chmod +x "$STAGING/youtube-source/ffmpeg"
          
          # Create install script
          cat > "$STAGING/install.sh" << 'SCRIPT'
          #!/bin/bash
          set -e
          cd "$(dirname "$0")"
          VDJ="$HOME/Library/Application Support/VirtualDJ"

          # Install to both folders: PluginsMacArm (Apple Silicon native VDJ)
          # and Plugins64 (Intel / Rosetta VDJ)
          for SUB in PluginsMacArm Plugins64; do
              PLUGDIR="$VDJ/$SUB/OnlineSources"
              mkdir -p "$PLUGDIR/youtube-source/ui"
              rm -rf "$PLUGDIR/YouTubeSource.bundle"
              cp -R YouTubeSource.bundle "$PLUGDIR/"
              cp -R youtube-source/ui/* "$PLUGDIR/youtube-source/ui/"
              cp youtube-source/yt-dlp "$PLUGDIR/youtube-source/yt-dlp"
              cp youtube-source/ffmpeg "$PLUGDIR/youtube-source/ffmpeg"
              chmod +x "$PLUGDIR/youtube-source/yt-dlp" "$PLUGDIR/youtube-source/ffmpeg"
              # Remove quarantine from EVERYTHING (bundle included) or Gatekeeper
              # silently blocks the unsigned plugin from loading
              xattr -dr com.apple.quarantine "$PLUGDIR" 2>/dev/null || true
              echo "Installed to $PLUGDIR"
          done

          # Ad-hoc sign the bundles so Apple Silicon will load them
          for SUB in PluginsMacArm Plugins64; do
              codesign --force --deep -s - "$VDJ/$SUB/OnlineSources/YouTubeSource.bundle" 2>/dev/null || true
          done

          echo ""
          echo "Done. Restart VirtualDJ - YouTube Source appears under Online Sources."
          SCRIPT
          chmod +x "$STAGING/install.sh"
          
          # Zip it up
          cd staging
          zip -r YouTubeSource-macOS.zip youtube-source-mac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTubeSource-macOS
          path: mac/staging/YouTubeSource-macOS.zip
          retention-days: 30

      - name: Attach to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mac/staging/YouTubeSource-macOS.zip
          draft: true

