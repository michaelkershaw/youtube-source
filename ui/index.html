<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Source</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- Title bar -->
  <div id="titlebar">
    <div class="logo">&#9654;</div>
    <div>
      <span class="title">YouTube Source</span>
      <span class="version" id="version"></span>
    </div>
    <div class="spacer"></div>
    <span class="badge trial" id="license-badge">UNLICENSED</span>
    <button class="winbtn" id="btn-min">&#8211;</button>
    <button class="winbtn close" id="btn-close">&#10005;</button>
  </div>

  <!-- Tabs -->
  <div id="tabs">
    <button class="tab active" data-view="search">Search</button>
    <button class="tab" data-view="playlists">Playlists</button>
    <button class="tab" data-view="trending">Trending</button>
    <button class="tab" data-view="charts">Charts</button>
    <button class="tab" data-view="history">Downloads</button>
    <button class="tab" data-view="license">License</button>
    <button class="tab" data-view="settings">Settings</button>
  </div>

  <!-- Toolbar (search view) -->
  <div id="toolbar">
    <div class="searchwrap">
      <span class="icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search YouTube..." autocomplete="off" autofocus>
      <div id="search-dropdown"></div>
    </div>
    <button class="btn primary" id="btn-search">SEARCH</button>
    <span id="duration-badge" style="display:none; font-size:11px; color:#f90;
      background:rgba(255,153,0,0.12); border:1px solid rgba(255,153,0,0.35);
      border-radius:10px; padding:3px 8px; white-space:nowrap; cursor:pointer"
      title="Duration filter active - click to change in Settings"></span>
    <div class="format-toggle">
      <button id="fmt-mp3" class="active mp3">MP3</button>
      <button id="fmt-mp4">MP4</button>
    </div>
  </div>

  <!-- Content -->
  <div id="content"></div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-text">Ready</span>
    <div id="progress-area"></div>
    <span id="machine-id" title="Click to copy"></span>
  </div>

</div>

<!-- Context menu -->
<div id="ctxmenu"></div>

<!-- Toasts -->
<div id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
